<script>
/* ===== DOM ===== */
const targetsLayer=document.getElementById('targets'),
 whiteflash=document.getElementById('whiteflash'),
 scoreEl=document.getElementById('score'),
 livesEl=document.getElementById('lives'),
 levelEl=document.getElementById('level'),
 hiscoreEl=document.getElementById('hiscore'),
 avgEl=document.getElementById('avg'),
 bestEl=document.getElementById('best'),
 centerText=document.getElementById('centerText'),
 comboText=document.getElementById('comboText'),
 gameoverEl=document.getElementById('gameover'),
 summaryEl=document.getElementById('summary'),
 startOverlay=document.getElementById('startOverlay'),
 progressBar=document.getElementById('progressBar'),
 bgGrid=document.getElementById('bgGrid'),
 muteMusicBtn=document.getElementById('muteMusic'),
 muteFXBtn=document.getElementById('muteFX'),
 savedHS=document.getElementById('savedHS'),
 brandLogo=document.getElementById('brandLogo'),
 brandIntro=document.getElementById('brandIntro');

/* ===== State ===== */
let score=0,lives=5,level=1,roundClicks=0,active=false;
const targetsPerLevel=20;
let reactionTimes=[],bestReaction=Infinity,combo=0,lastClickTime=0;
let hiscore=Number(localStorage.getItem('taprushreflex_hs')||'0');
hiscoreEl.textContent=hiscore.toString().padStart(3,'0');
const activeTargets=[];let allowSpawning=false,levelStats=[],targetIdCounter=0;
let dualLastTime=0,dualLastId=null;

/* ===== Helpers ===== */
function getCSSNumber(varName, fallback){
  const v=getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  const n=parseFloat(v);
  return isNaN(n)?fallback:n;
}
function targetSize(){
  return getCSSNumber('--targetSize',80); // px
}

/* ===== Brand logo (inline canvas) ===== */
(function genLogo(){
  const c=document.createElement('canvas');c.width=900;c.height=240;const x=c.getContext('2d');
  x.fillStyle='#0a5bd9';
  x.beginPath();x.moveTo(130,60);x.arcTo(230,60,230,120,40);x.lineTo(230,120);x.arcTo(230,180,170,180,40);
  x.lineTo(170,180);x.lineTo(170,160);x.lineTo(210,160);x.arcTo(190,160,190,120,20);x.lineTo(150,120);
  x.arcTo(110,120,110,80,20);x.lineTo(110,80);x.arcTo(110,60,130,60,20);x.closePath();x.fill();
  x.font='bold 72px system-ui,Segoe UI';x.fillStyle='#0a5bd9';x.textBaseline='middle';x.fillText('SmartProc',280,95);
  x.font='600 46px system-ui,Segoe UI';x.fillStyle='#7ea0c9';x.fillText('GAMES',280,165);
  brandLogo.src=c.toDataURL('image/png');
})();

/* ===== Audio Engine ===== */
let AC=null, master=null, musicTimer=null;
let musicMuted=false, fxMuted=false;
function ensureAudio(){if(AC)return;AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=0.6;master.connect(AC.destination);}
function envGain(time,a=0.002,d=0.08,s=0.0,r=0.12,peak=1.0){const g=AC.createGain();g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime(peak,time+a);g.gain.linearRampToValueAtTime(s*peak,time+a+d);g.gain.setTargetAtTime(0,time+a+d,r);return g;}
function osc(type,freq){const o=AC.createOscillator();o.type=type;o.frequency.value=freq;return o;}
function playNoise({time=AC.currentTime,dur=0.2,lp=800,hp=0}={}){if(fxMuted)return;const src=AC.createBufferSource();const len=AC.sampleRate*1.5,buf=AC.createBuffer(1,len,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;src.buffer=buf;let node=src;if(hp>0){const h=AC.createBiquadFilter();h.type='highpass';h.frequency.value=hp;node.connect(h);node=h;}if(lp>0){const l=AC.createBiquadFilter();l.type='lowpass';l.frequency.value=lp;node.connect(l);node=l;}const e=envGain(time,0.002,dur*0.5,0, dur*0.6,1.0);node.connect(e).connect(master);src.start(time);src.stop(time+dur+0.4);}
function clickTone({f=320,dur=0.07,type='triangle',gain=0.8}={}){if(fxMuted)return;const t=AC.currentTime,o=osc(type,f),eg=envGain(t,0.002,0.06,0.0,0.08,gain);o.connect(eg).connect(master);o.start(t);o.stop(t+dur+0.3);}
function glideTone({f1=300,f2=740,dur=0.2,type='triangle',gain=0.7}={}){if(fxMuted)return;const t=AC.currentTime,o=osc(type,f1),eg=envGain(t,0.003,0.08,0.0,0.12,gain);o.frequency.linearRampToValueAtTime(f2,t+dur);o.connect(eg).connect(master);o.start(t);o.stop(t+dur+0.4);}
function fx_click(){clickTone({});}
function fx_power(){if(!AC||fxMuted)return;const t=AC.currentTime,o1=osc('square',440),eg1=envGain(t,0.01,0.08,0.0,0.12,0.09);const o2=osc('square',660);o2.frequency.linearRampToValueAtTime(1320,t+0.12);const eg2=envGain(t,0.01,0.08,0.0,0.12,0.09);o1.connect(eg1).connect(master);o2.connect(eg2).connect(master);o1.start(t);o1.stop(t+0.3);o2.start(t);o2.stop(t+0.3);}
function fx_life(){if(!AC||fxMuted)return;glideTone({});}
function fx_bomb(){if(!AC||fxMuted)return;playNoise({dur:0.24,lp:600,hp:80});const t=AC.currentTime,o=osc('sine',90),eg=envGain(t,0.01,0.12,0.0,0.2,0.5);o.connect(eg).connect(master);o.start(t);o.stop(t+0.4);}
function fx_miss(){if(!AC||fxMuted)return;const t=AC.currentTime,o=osc('triangle',480);o.frequency.linearRampToValueAtTime(210,t+0.2);const eg=envGain(t,0.002,0.12,0.0,0.12,0.5);o.connect(eg).connect(master);o.start(t);o.stop(t+0.5);}

/* Musik (enkel loop) */
function chordPad({freqs=[220,277],dur=1.0,type='triangle',gain=0.08,lp=900}={}){if(musicMuted)return;const t=AC.currentTime,out=AC.createGain();out.gain.value=gain;const l=AC.createBiquadFilter();l.type='lowpass';l.frequency.value=lp;out.connect(l).connect(master);freqs.forEach((f,i)=>{const o=osc(type,f);o.detune.value=(i-0.5)*6;const eg=envGain(t,0.2,0.5,0.6,0.6,1.0);o.connect(eg).connect(out);o.start(t);o.stop(t+dur+1.0);});}
function music_stop(){if(musicTimer){clearInterval(musicTimer);musicTimer=null;}}
function music_play(){if(musicMuted)return;ensureAudio();if(AC.state==='suspended')AC.resume();music_stop();const bpm=105,beat=60/bpm;function tick(){if(musicMuted)return;const t=AC.currentTime,o=osc('sine',55),eg=envGain(t,0.005,0.08,0.0,0.12,0.35);o.connect(eg).connect(master);o.start(t);o.stop(t+0.25);chordPad({freqs:[220,277],dur:beat*2});}tick();musicTimer=setInterval(tick,beat*2000);}
function updateMuteIcons(){muteMusicBtn.textContent=musicMuted?'🔇':'🔊';muteFXBtn.textContent=fxMuted?'🔈':'💥';muteMusicBtn.classList.toggle('off',musicMuted);muteFXBtn.classList.toggle('off',fxMuted);}
muteMusicBtn.onclick=()=>{musicMuted=!musicMuted;if(musicMuted)music_stop();else{ensureAudio();music_play();}updateMuteIcons();};
muteFXBtn.onclick=()=>{fxMuted=!fxMuted;updateMuteIcons();};
function saveHiScore(v){localStorage.setItem('taprushreflex_hs',v);hiscoreEl.textContent=v.toString().padStart(3,'0');savedHS.classList.add('show');setTimeout(()=>savedHS.classList.remove('show'),800);}
function avg(a){return a.length?a.reduce((x,y)=>x+y)/a.length:0;}
function fmt(ms){return (ms/1e3).toFixed(2)+'s';}
function pad3(n){return n.toString().padStart(3,'0');}
function updateProgress(){const pct=Math.min(1,roundClicks/targetsPerLevel);progressBar.style.width=(pct*100).toFixed(1)+'%';}
function randPos(){
  const w = targetSize();          // bredd/höjd på mål
  const p = 20;                    // baspadding
  const hudH = parseInt(getComputedStyle(document.documentElement)
               .getPropertyValue('--hudHeight')) || 140;

  // Safe zones för mobiler
  const topSafe    = hudH + 25;    // undvik HUD + notch/dynamic island
  const bottomSafe = 90;           // undvik iPhone home-indikator + nav-bar

  // Horisontellt utrymme
  const minX = p;
  const maxX = innerWidth - w - p;

  // Vertikalt utrymme
  const minY = topSafe;
  const maxY = innerHeight - w - bottomSafe;

  return {
    x: minX + Math.random() * (maxX - minX),
    y: minY + Math.random() * (maxY - minY)
  };
}

/* ===== Difficulty & Theme ===== */
function getBombChance(l){ if(l<4)return 0.05; if(l<8)return 0.06; if(l<11)return 0.07; if(l<15)return 0.08; return 0.10; }
function setLevelTheme(l){ const d=Math.min(1,(l-1)/10);
  const neon=`hsl(${180-20*d} 100% ${72-12*d}%)`,
        inner=`hsl(${190-15*d} 45% ${22-6*d}%)`,
        outer=`hsl(${196-10*d} 45% ${14-5*d}%)`,
        grid =`hsl(${190-10*d} 40% ${12-2*d}%)`;
  const r=document.documentElement.style;
  r.setProperty('--neon',neon); r.setProperty('--bg2',inner); r.setProperty('--bg1',outer); r.setProperty('--grid',grid);
  document.body.style.background=`radial-gradient(1200px 800px at 50% 45%, var(--bg2), var(--bg1))`;
}
function getLevelSpeed(l){const m={1:1500,2:1000,3:900,4:1500,5:1300,6:1100,7:950,8:850,9:750,10:1100,11:950,12:850,13:750,14:700,15:650,16:600,17:550,18:500};return m[l]||Math.max(400,500-(l-18)*20);}
function determineActiveBlocks(l){ if(l<4) return 1; if(l<10) return 2; return 3; }
const levelColors={1:'#00ff66',2:'#00ffff',3:'#ff9900',4:'#3399ff',5:'#7d6bff'};
function getLevelColor(l){ if(levelColors[l])return levelColors[l];
  const p=['#68ff5b','#47fff1','#ffb347','#ff5b9a','#7d6bff','#ffe066','#66a3ff','#64ffda']; return p[(l-6)%p.length]; }

/* ===== Inline PNGs (bomb/power/heart) ===== */
function mk(w=256,h=256){const c=document.createElement('canvas');c.width=w;c.height=h;return[c,c.getContext('2d')];}
function rr(x,y,w,h,r,ctx){const R=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+R,y);ctx.arcTo(x+w,y,x+w,y+h,R);ctx.arcTo(x+w,y+h,x,y+h,R);ctx.arcTo(x,y+h,x,y,R);ctx.arcTo(x,y,x+w,y,R);ctx.closePath();}
function genBombPNG(){let [c,x]=mk(),W=c.width,H=c.height,Cx=W/2,Cy=H/2;x.shadowColor='rgba(255,40,65,.35)';x.shadowBlur=25;let g=x.createRadialGradient(Cx-20,Cy-20,10,Cx,Cy,120);g.addColorStop(0,'#aa1020');g.addColorStop(1,'#4a0a12');x.beginPath();x.arc(Cx,Cy,80,0,7);x.fill();x.strokeStyle='rgba(0,0,0,.6)';x.lineWidth=6;x.stroke();x.shadowColor='transparent';x.beginPath();x.moveTo(Cx+50,Cy-60);x.bezierCurveTo(Cx+65,Cy-90,Cx+85,Cy-98,Cx+102,Cy-85);x.strokeStyle='#1c1c1c';x.lineWidth=10;x.stroke();x.fillStyle='#333';x.beginPath();x.arc(Cx+108,Cy-88,10,0,7);x.fill();x.save();x.translate(Cx+110,Cy-90);x.shadowColor='rgba(255,200,50,.9)';x.shadowBlur=25;let g2=x.createRadialGradient(0,0,2,0,0,22);g2.addColorStop(0,'#fff59e');g2.addColorStop(1,'#ff7f00');x.fillStyle=g2;x.beginPath();x.arc(0,0,16,0,7);x.fill();x.restore();return c.toDataURL('image/png');}
function genHeartPNG(){let [c,x]=mk(),W=c.width,H=c.height,X=W/2,Y=H/2+20;x.shadowColor='rgba(255,80,120,.45)';x.shadowBlur=35;x.beginPath();x.moveTo(X,Y+50);x.bezierCurveTo(X+70,Y+10,X+80,Y-60,X,Y-40);x.bezierCurveTo(X-80,Y-60,X-70,Y+10,X,Y+50);let g=x.createLinearGradient(0,Y-80,0,Y+60);g.addColorStop(0,'#ff4d6d');g.addColorStop(1,'#c1121f');x.fillStyle=g;x.fill();x.lineWidth=6;x.strokeStyle='rgba(0,0,0,.5)';x.stroke();return c.toDataURL('image/png');}
function genPowerPNG(){let [c,x]=mk(),W=c.width,H=c.height;const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#c28aff');g.addColorStop(1,'#7432ff');x.fillStyle=g;x.shadowColor='#b879ff';x.shadowBlur=30;rr(36,36,W-72,H-72,22,x);x.fill();x.shadowColor='transparent';x.lineWidth=8;x.strokeStyle='rgba(255,255,255,0.18)';x.stroke();x.font='bold 150px system-ui';x.textAlign='center';x.textBaseline='middle';x.fillStyle='#fff';x.shadowColor='#ffffffbb';x.shadowBlur=25;x.fillText('+3',W/2,H/2+20);return c.toDataURL('image/png');}
const ASSET={bomb:genBombPNG(),power:genPowerPNG(),heart:genHeartPNG()};

/* ===== Block spawning ===== */
function chooseBlockType(){
  const alreadyBomb=activeTargets.some(t=>t.type==='bomb');
  const chance=getBombChance(level);
  while(true){
    const r=Math.random();
    let type=(r<.05)?'life':(r<.05+chance)?'bomb':(r<.05+chance+.05)?'power':'normal';
    if(type==='bomb' && alreadyBomb) continue; // max 1 bomb at a time
    return type;
  }
}
function createTarget(){
  const el=document.createElement('div'); el.className='target'; el.style.pointerEvents='auto';
  const {x,y}=randPos(); el.style.left=x+'px'; el.style.top=y+'px';
  el.style.width=el.style.height=targetSize()+'px';
  targetsLayer.appendChild(el); requestAnimationFrame(()=>el.classList.add('spawned')); return el;
}
function renderTarget(el,type){
  el.classList.remove('t-bomb','pulse'); el.innerHTML='';
  if(type==='normal'){
    const c=getLevelColor(level);
    el.style.background=c; el.style.boxShadow=`0 0 20px ${c}66, inset 0 0 12px rgba(255,255,255,.18)`;
  }else{
    el.style.background='transparent'; if(type==='bomb') el.classList.add('t-bomb','pulse');
    const img=document.createElement('img'); img.src=(type==='bomb')?ASSET.bomb:(type==='power')?ASSET.power:ASSET.heart; el.appendChild(img);
  }
}
function removeTarget(t){ clearTimeout(t.timeoutId); if(t.el&&t.el.parentNode) t.el.parentNode.removeChild(t.el); const i=activeTargets.indexOf(t); if(i>=0) activeTargets.splice(i,1); }

/* ===== UI popups & combo ===== */
function popupAt(el,text,cls){ const p=document.createElement('div'); p.className=`popup ${cls} rise`; p.textContent=text;
  const r=el.getBoundingClientRect(); p.style.left=(r.left+r.width/2)+'px'; p.style.top=(r.top+r.height/2)+'px';
  document.body.appendChild(p); setTimeout(()=>p.remove(),650); }
function showCombo(text){ comboText.textContent=text; comboText.style.display='block'; setTimeout(()=>comboText.style.display='none',500); }

/* ===== Spawn control ===== */
function ensureTargets(){ if(!active||!allowSpawning) return; const need=determineActiveBlocks(level)-activeTargets.length; for(let i=0;i<need;i++) spawnOne(); }
function scheduleSpawnFill(){ if(!active) return; setTimeout(()=>ensureTargets(),100); }
function spawnOne(){
  const el=createTarget(); const type=chooseBlockType(); renderTarget(el,type);
  const shownAt=performance.now();
  const timeout=setTimeout(()=>{
    removeTarget(tObj);
    if(type!=='bomb'){
      lives=Math.max(0,lives-1); livesEl.textContent=String(lives);
      if(AC) fx_miss();
      if(lives<=0){ endGame(); return; }
    }
    scheduleSpawnFill();
  }, getLevelSpeed(level));
  const tObj={id:++targetIdCounter,el,type,shownAt,timeoutId:timeout}; activeTargets.push(tObj);

  el.onclick=()=>{
    if(!active) return;
    const now=performance.now(), rt=now-tObj.shownAt;

    if(type!=='bomb'){ reactionTimes.push(rt); levelStats.push({type,time:rt});
      avgEl.textContent=fmt(avg(reactionTimes)); bestReaction=Math.min(bestReaction,rt); bestEl.textContent=fmt(bestReaction); }

    if(now-lastClickTime<600){ combo++; showCombo(`COMBO x${combo}`);} else combo=1; lastClickTime=now;

    if(type==='normal'){ score+=1; roundClicks++; popupAt(el,'+1','good'); if(AC) fx_click(); }
    else if(type==='power'){ score+=3; roundClicks++; popupAt(el,'+3','p3'); if(AC) fx_power(); }
    else if(type==='life'){ lives=Math.min(9,lives+1); roundClicks++; livesEl.textContent=String(lives); popupAt(el,'❤️ +1','life'); if(AC) fx_life(); }
    else if(type==='bomb'){ whiteflash.style.display='block'; setTimeout(()=>whiteflash.style.display='none',130);
      lives=Math.max(0,lives-1); livesEl.textContent=String(lives); popupAt(el,'💣 -1','bad'); if(AC) fx_bomb();
      if(lives<=0){ removeTarget(tObj); endGame(); return; } }

    // Dual-hit bonus (if two non-bomb clicks within 400ms)
    if(type!=='bomb'){
      if(dualLastTime && (now-dualLastTime<=400) && dualLastId!==tObj.id){
        score+=2; popupAt(el,'DUAL HIT! +2','dual'); dualLastTime=0; dualLastId=null;
      } else { dualLastTime=now; dualLastId=tObj.id; }
    }

    scoreEl.textContent=pad3(score); updateProgress(); removeTarget(tObj);

    if(roundClicks>=targetsPerLevel){
      allowSpawning=false;
      if(activeTargets.length===0) showLevelSummary();
      else{ const wait=setInterval(()=>{ if(activeTargets.length===0){ clearInterval(wait); showLevelSummary(); } },50); }
    } else scheduleSpawnFill();
  };
}

/* ===== Level summary + intro (skapade men dolda) ===== */
const levelSummary=document.createElement('div'); levelSummary.id='levelSummary';
levelSummary.style.cssText='display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#e0faff;padding:24px 36px;border-radius:18px;font-size:22px;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.5);z-index:9';
levelSummary.innerHTML=`<h2 id="sumTitle">LEVEL COMPLETE!</h2><div id="sumCore"></div><button id="toggleStats">Show More Stats ▼</button><div id="moreStats" style="display:none;text-align:left;margin-top:10px;font-size:15px"></div><button id="continueBtn">Continue →</button>`;
document.getElementById('game').appendChild(levelSummary);
const sumTitle=document.getElementById('sumTitle'), sumCore=document.getElementById('sumCore'),
      moreStats=document.getElementById('moreStats'), toggleStats=document.getElementById('toggleStats'),
      continueBtn=document.getElementById('continueBtn');

const levelIntro=document.createElement('div'); levelIntro.id='levelIntro';
levelIntro.style.cssText='display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#e0faff;padding:24px 36px;border-radius:18px;font-size:22px;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.5);z-index:9';
levelIntro.innerHTML=`<h1 id="introTitle">LEVEL 1</h1><div id="introDesc"></div>`;
document.getElementById('game').appendChild(levelIntro);
const introTitle=document.getElementById('introTitle'), introDesc=document.getElementById('introDesc');

function showLevelSummary(){ active=false;
  const times=levelStats.map(x=>x.time), avgL=times.length?fmt(avg(times)):'–', bestL=times.length?fmt(Math.min(...times)):'–';
  sumTitle.textContent=`LEVEL ${level} COMPLETE!`;
  sumCore.innerHTML=`Avg Reaction: <b>${avgL}</b><br>Fastest: <b>${bestL}</b>`;
  moreStats.innerHTML=levelStats.map((x,i)=>`${i+1}. ${x.type.toUpperCase()} — ${fmt(x.time)}`).join('<br>');
  toggleStats.textContent='Show More Stats ▼'; moreStats.style.display='none'; levelSummary.style.display='block';
}
toggleStats.onclick=()=>{ const s=moreStats.style; if(s.display==='none'){ s.display='block'; toggleStats.textContent='Hide Stats ▲'; } else { s.display='none'; toggleStats.textContent='Show More Stats ▼'; } };

/* ===== Continue — SDK borttagen, vi går direkt vidare ===== */
// ============================================================
// Kontrollera Game Over-läge
// ============================================================
function checkGameOver() {
  if (lives <= 0) {
    active = false;
    allowSpawning = false;

    // Visa Game Over-overlay
    const gameoverEl = document.getElementById("gameover");
    const summaryEl = document.getElementById("summary");
    if (gameoverEl && summaryEl) {
      summaryEl.innerHTML = `<b>Final Score:</b> ${score}<br><b>Best:</b> ${localStorage.getItem("highscore") || score}`;
      gameoverEl.style.display = "block";
    }

    if (typeof music_stop === "function") music_stop();
    if (typeof fx_fail === "function") fx_fail();

    return true; // markerar att spelet är slut
  }
  return false;
}

continueBtn.onclick=()=>{ proceedToNextLevel(); };

function proceedToNextLevel() {
  levelSummary.style.display = "none";
  levelIntro.style.display   = "none";

  roundClicks = 0;
  levelStats  = [];
  active      = true;
  allowSpawning = true;

  // ✅ Öka nivån och uppdatera HUD innan skylten visas
  level++;
  levelEl.textContent = String(level);
  updateProgress();
  setLevelTheme(level);

  // ✅ Visa skylten för rätt level
  showLevelIntro(level, () => {
    countdown(() => { ensureTargets(); }, 700);
  });
}

// ============================================================
// Level Intro – Informationsskylt före varje bana
// ============================================================
// ============================================================
// Level Intro – Informationsskylt före varje bana
// ============================================================
// ============================================================
// Level Intro – Informationsskylt före varje bana (med fade)
// ============================================================
function showLevelIntro(level, done) {
  const introEl  = document.getElementById("levelIntro");
  const titleEl  = document.getElementById("introTitle");
  const descEl   = document.getElementById("introDesc");

  // Hämta data för aktuell level
  const color      = getLevelColor(level);
  const reactMs    = getLevelSpeed(level);
  const reactSec   = (reactMs / 1000).toFixed(2);
  const blocks     = determineActiveBlocks(level);
  const bombChance = Math.round(getBombChance(level) * 100);

  // Sätt innehållet
  titleEl.textContent = "LEVEL " + level;
  descEl.innerHTML =
    `<b>Color of blocks:</b> ` +
    `<span style="
      display:inline-block;
      width:22px;
      height:22px;
      margin:0 8px;
      border-radius:4px;
      background:${color};
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 0 10px ${color};
      vertical-align:middle;
    "></span><br>` +
    `<b>Reaction time:</b> ${reactSec} s<br>` +
    `<b>Blocks per round:</b> ${blocks}<br>` +
    `<b>Bomb chance:</b> ${bombChance}%`;

  // Förbered fade
  introEl.style.opacity = 0;
  introEl.style.display = "block";
  introEl.style.transition = "opacity 0.5s ease";

  // Fade in
  requestAnimationFrame(() => {
    introEl.style.opacity = 1;
  });

  // Visa i 3 sekunder, sedan fade ut
  setTimeout(() => {
    introEl.style.opacity = 0;
    setTimeout(() => {
      introEl.style.display = "none";
      if (done) done();
    }, 500); // fade ut-tid
  }, 3000); // visas 3 sekunder innan fade ut
}

/* ===== Start / End / Countdown ===== */
function startGame() {
  // Säkerställ rent läge
  levelSummary.style.display = 'none';
  levelIntro.style.display   = "none";
  gameoverEl.style.display = 'none';

  score = 0; lives = 5; level = 1;
  roundClicks = 0; reactionTimes = [];
  bestReaction = Infinity; combo = 0;
  lastClickTime = 0; levelStats = [];
  dualLastTime = 0; dualLastId = null;
  scoreEl.textContent = '000';
  livesEl.textContent = '5';
  levelEl.textContent = '1';
  avgEl.textContent = '–';
  bestEl.textContent = '–';
  updateProgress();
  setLevelTheme(level);

  // Rensa gamla mål
  [...activeTargets].forEach(t => removeTarget(t));

  // Starta ljud
  ensureAudio();
  if (!musicMuted) {
    if (AC.state === 'suspended') AC.resume();
    music_play();
  }

// Starta spelet direkt
active = true;
allowSpawning = true;

// NYTT – visa Level Intro innan nedräkning
showLevelIntro(level, () => {
  countdown(() => { ensureTargets(); }, 700);
});
} // ← Denna saknades


// ============================================================
// Countdown — 3 2 1 GO
// ============================================================
function countdown(done, stepMs = 700) {
  const steps = ["3", "2", "1", "GO"];
  let i = 0;

  (function step() {
    centerText.textContent = steps[i];
    centerText.style.display = "block";

    setTimeout(() => {
      centerText.style.display = "none";
      if (++i < steps.length) {
        setTimeout(step, stepMs);
      } else if (done) {
        done();
      }
    }, Math.min(500, stepMs));
  })();
}



function endGame(){
  active=false; allowSpawning=false; [...activeTargets].forEach(t=>removeTarget(t)); music_stop();

  if(score>hiscore){ hiscore=score; saveHiScore(score); }
  const avgMs=avg(reactionTimes);
  summaryEl.innerHTML=`Score:<b>${score}</b><br>Level:<b>${level}</b><br>Avg:${reactionTimes.length?fmt(avgMs):'–'}<br>Best:${isFinite(bestReaction)?fmt(bestReaction):'–'}<br>High:${hiscore}`;
  gameoverEl.style.display='block';
}
gameoverEl.addEventListener('click', startGame);

// Countdown — 3 2 1 GO
// ============================================================
function countdown(done, stepMs = 700) {
  const steps = ["3", "2", "1", "GO"];
  let i = 0;

  (function step() {
    centerText.textContent = steps[i];
    centerText.style.display = "block";

    setTimeout(() => {
      centerText.style.display = "none";
      if (++i < steps.length) setTimeout(step, stepMs);
      else if (done) done();
    }, Math.min(500, stepMs));
  })();
}

startOverlay.addEventListener('click', () => {

window.addEventListener('mousemove', e => {
  const dx = (e.clientX / innerWidth - 0.5) * 16;
  const dy = (e.clientY / innerHeight - 0.5) * 16;
  bgGrid.style.transform = `translate(${dx}px, ${dy}px)`;
}, { passive: true });

window.addEventListener('deviceorientation', e => {
  const dx = (e.gamma || 0) / 3;
  const dy = -(e.beta || 0) / 6;
  bgGrid.style.transform = `translate(${dx}px, ${dy}px)`;
}, { passive: true });

setLevelTheme(level);
updateMuteIcons();
